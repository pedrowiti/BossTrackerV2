<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mir4 Boss Tracker V2</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header>

        <h1>🔥 Mir4 Boss Tracker V2</h1>

        <div id="timezoneInfo">
            Detectando zona horaria...
        </div>

    </header>


    <section class="toolbar">

    <!--==========================================
        Notification Settings button and panel
    ===========================================-->


    <div class="notificationWrapper">

    <button
        id="btnNotifications"
        title="Notifications">

        🔕

    </button>

    <div
        id="notificationPanel"
        class="notificationPanel hidden">

        <h3 id="notificationTitle">
            🔔 Notifications
        </h3>

        <div class="notificationOption">

            <span id="notificationEnabledLabel">
                Enable notifications
            </span>

            <label class="switch">

                <input
                    type="checkbox"
                    id="chkNotifications">

                <span class="slider"></span>

            </label>

        </div>

        <hr>

        <div class="notificationOption">

            <span id="notificationWindowsLabel">
                Windows notifications
            </span>

            <label class="switch">

                <input
                    type="checkbox"
                    id="chkWindows">

                <span class="slider"></span>

            </label>

        </div>

        <div class="notificationOption">

            <span id="notificationSoundLabel">
                Sound
            </span>

            <label class="switch">

                <input
                    type="checkbox"
                    id="chkSound">

                <span class="slider"></span>

            </label>

        </div>

        <hr>

        <div id="notificationWhenLabel">

            Notify when:

        </div>

        <label>

            <input
                type="checkbox"
                id="chk10">

            10 minutes before

        </label>

        <label>

            <input
                type="checkbox"
                id="chk5">

            5 minutes before

        </label>

        <label>

            <input
                type="checkbox"
                id="chkSpawn">

            On spawn

        </label>

    </div>

</div>

    <button id="btnReset">
        ♻️ Reset All
    </button>

    <select id="languageSelector"></select>

</section>


    <section class="filters">

        <input
            id="searchInput"
            type="text"
            placeholder="Buscar Boss..."
        >

        <select id="worldFilter">

           <option value="ALL">🌍 Mundos</option>

            <option value="W1">W1</option>
            <option value="W2">W2</option>
            <option value="W3">W3</option>
            <option value="W4">W4</option>
            <option value="W5">W5</option>
            <option value="W6">W6</option>
            <option value="W7">W7</option>
            <option value="W8">W8</option>

            <option disabled>────────────</option>

            <option value="L1-W1">Layer 1 W1</option>
            <option value="L1-W2">Layer 1 W2</option>
            <option value="L1-W3">Layer 1 W3</option>

        </select>

    </section>


    <h2>🔥 Bosses Activos</h2>

    <div id="activeBosses">

    </div>


    <h2>⏳ Próximos Bosses</h2>

    <div class="layout">

        <main id="bossList">

        </main>

        <aside>

            <h3 id="completedTitle">
                Completed (0)
            </h3>

            <div id="completedList">

            </div>

        </aside>

    </div>

</div>

<script type="module" src="./js/app.js"></script>

</body>

</html>
